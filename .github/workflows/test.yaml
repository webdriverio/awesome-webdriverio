name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
        - uses: actions/checkout@v6
          with:
            fetch-depth: 0
        - uses: actions/setup-node@v5
          with:
            node-version: '22'
        - name: Install
          run: npm ci
        - name: Test
          run: npm test
